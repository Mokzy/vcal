<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="vCal">
<meta name="theme-color" content="#f8fafc">
<title>vCal — Voice Calorie Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2310b981'/><text x='50' y='68' text-anchor='middle' font-size='52'>🔥</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%2310b981'/><text x='90' y='120' text-anchor='middle' font-size='90'>🔥</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f8fafc;
  --text:#1e293b;
  --text-sub:#64748b;
  --text-dim:#94a3b8;
  --glass:rgba(255,255,255,0.6);
  --glass-border:rgba(255,255,255,0.5);
  --glass-subtle:rgba(255,255,255,0.5);
  --shadow:rgba(0,0,0,0.04);
  --accent:#10b981;
  --accent-glow:rgba(16,185,129,0.25);
}
html,body{
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;min-height:100dvh;
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
body{position:relative;overflow-x:hidden}
::-webkit-scrollbar{width:0;display:none}

/* ── Mesh Background ── */
.mesh-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden;background:#f8fafc}
.mesh-bg .orb{position:absolute;border-radius:50%;filter:blur(100px)}
.mesh-bg .orb1{top:-10%;left:-10%;width:50%;height:50%;background:rgba(96,165,250,0.3);animation:orbPulse 8s ease-in-out infinite}
.mesh-bg .orb2{top:20%;right:-10%;width:60%;height:60%;background:rgba(253,164,175,0.3);animation:orbPulse 10s ease-in-out infinite}
.mesh-bg .orb3{bottom:-10%;left:20%;width:70%;height:70%;background:rgba(110,231,183,0.2);animation:orbPulse 12s ease-in-out infinite}
@keyframes orbPulse{0%,100%{opacity:1}50%{opacity:0.5}}

/* ── App Container ── */
.app{max-width:448px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;padding-bottom:140px;padding-top:env(safe-area-inset-top);z-index:1}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:48px 24px 8px}
.header-date{font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#64748b}
.header-title{font-size:30px;font-weight:700;letter-spacing:-0.02em;color:#0f172a;margin-top:2px}
.header-avatar{width:48px;height:48px;border-radius:50%;overflow:hidden;border:2px solid #fff;box-shadow:0 4px 16px rgba(0,0,0,0.06);background:#e2e8f0;cursor:pointer;transition:transform 0.2s;flex-shrink:0}
.header-avatar:hover{transform:scale(1.05)}
.header-avatar img{width:100%;height:100%;object-fit:cover}

/* ── Dashboard Card ── */
.dashboard{
  margin:32px 20px 0;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(40px) saturate(1.8);
  -webkit-backdrop-filter:blur(40px) saturate(1.8);
  border:1px solid rgba(255,255,255,0.5);
  border-radius:24px;
  padding:24px;
  box-shadow:0 8px 30px rgba(0,0,0,0.04);
  overflow:hidden;
}
.dashboard-inner{display:flex;align-items:center;justify-content:space-between;gap:32px}
.calorie-ring{position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.calorie-ring svg{width:112px;height:112px;transform:rotate(-90deg)}
.calorie-ring .track{stroke:#e2e8f0;stroke-opacity:0.5;fill:transparent;stroke-width:8}
.calorie-ring .progress{stroke:#10b981;fill:transparent;stroke-width:8;stroke-linecap:round;filter:drop-shadow(0 1px 2px rgba(16,185,129,0.3));transition:stroke-dashoffset 1s ease-out}
.calorie-center{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center}
.calorie-num{font-size:30px;font-weight:600;letter-spacing:-0.02em;color:#1e293b}
.calorie-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#64748b}
.macros{display:flex;flex-direction:column;gap:16px;flex:1;min-width:0}
.macro-row{display:flex;flex-direction:column;gap:6px}
.macro-header{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;font-weight:500}
.macro-name{color:#475569}
.macro-val{color:#94a3b8}
.macro-val strong{color:#1e293b;font-weight:600}
.macro-bar{height:6px;width:100%;border-radius:9999px;overflow:hidden}
.macro-bar-fill{height:100%;border-radius:9999px;transition:width 0.8s ease-out}
.macro-bar.protein{background:rgba(16,185,129,0.1)}
.macro-bar.protein .macro-bar-fill{background:#10b981}
.macro-bar.carbs{background:rgba(99,102,241,0.1)}
.macro-bar.carbs .macro-bar-fill{background:#6366f1}
.macro-bar.fat{background:rgba(244,63,94,0.1)}
.macro-bar.fat .macro-bar-fill{background:#f43f5e}

/* ── Recent Logs ── */
.logs-section{margin:32px 20px 0;padding-bottom:32px}
.logs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:0 8px}
.logs-title{font-size:14px;font-weight:600;color:#1e293b;letter-spacing:-0.01em}
.logs-see-all{font-size:12px;font-weight:500;color:#3b82f6;background:none;border:none;cursor:pointer;font-family:inherit}
.logs-see-all:hover{color:#2563eb}
.logs-list{display:flex;flex-direction:column;gap:12px}

.log-card{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px;
  border-radius:24px;
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,0.6);
  box-shadow:0 4px 16px rgba(0,0,0,0.02);
  opacity:0;transform:translateY(10px);
  animation:fadeInUp 0.4s ease-out forwards;
}
.log-card:nth-child(1){animation-delay:0s}
.log-card:nth-child(2){animation-delay:0.1s}
.log-card:nth-child(3){animation-delay:0.2s}
.log-card:nth-child(4){animation-delay:0.3s}
.log-card:nth-child(5){animation-delay:0.4s}
@keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}

.log-left{display:flex;align-items:center;gap:16px;min-width:0}
.log-icon{width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.log-icon.meal{background:rgba(99,102,241,0.1)}
.log-icon.meal svg{color:#6366f1}
.log-icon.snack{background:rgba(244,63,94,0.1)}
.log-icon.snack svg{color:#f43f5e}
.log-icon.drink{background:rgba(14,165,233,0.1)}
.log-icon.drink svg{color:#0ea5e9}
.log-icon svg{width:20px;height:20px;stroke-width:1.5}
.log-info{display:flex;flex-direction:column;min-width:0}
.log-name-row{display:flex;align-items:center;gap:8px}
.log-name{font-size:15px;font-weight:500;color:#1e293b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.quality-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,0.1)}
.quality-dot.green{background:#10b981}
.quality-dot.yellow{background:#fbbf24}
.quality-dot.red{background:#f43f5e}
.log-meta{display:flex;align-items:center;gap:8px;margin-top:2px}
.log-time{font-size:12px;font-weight:500;color:#64748b;white-space:nowrap}
.log-macros-tag{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:500;color:#64748b;background:rgba(148,163,184,0.15);padding:2px 6px;border-radius:6px}
.log-right{display:flex;align-items:baseline;gap:4px;padding-left:8px;flex-shrink:0}
.log-cal{font-size:16px;font-weight:600;color:#1e293b}
.log-cal-unit{font-size:10px;font-weight:600;text-transform:uppercase;color:#94a3b8}

/* ── Bottom Hotbar ── */
.hotbar-wrap{position:fixed;bottom:0;left:0;right:0;z-index:40;padding:16px 24px 32px;pointer-events:none}
.hotbar{
  margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  max-width:384px;width:100%;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(64px) saturate(1.8);
  -webkit-backdrop-filter:blur(64px) saturate(1.8);
  border:1px solid rgba(255,255,255,0.6);
  border-radius:9999px;
  padding:16px 32px;
  box-shadow:0 16px 40px rgba(0,0,0,0.1);
  pointer-events:auto;
  position:relative;
}
.hotbar-side{display:flex;gap:24px;align-items:center}
.hotbar-btn{background:none;border:none;padding:4px;cursor:pointer;color:#94a3b8;transition:color 0.2s;display:flex;align-items:center;justify-content:center}
.hotbar-btn:hover,.hotbar-btn.active{color:#1e293b}
.hotbar-btn svg{width:24px;height:24px;stroke-width:1.5}

/* Center Mic Button */
.mic-btn{
  position:absolute;left:50%;top:-24px;transform:translateX(-50%);
  width:72px;height:72px;border-radius:50%;
  border:1px solid rgba(51,65,85,0.5);
  background:linear-gradient(to top right,#1e293b,#0f172a);
  color:#f1f5f9;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(0,0,0,0.25);
  transition:all 0.3s;
}
.mic-btn:hover{transform:translateX(-50%) scale(1.05)}
.mic-btn:active{transform:translateX(-50%) scale(0.95)}
.mic-btn.recording{
  background:linear-gradient(to top right,#059669,#34d399);
  border-color:rgba(16,185,129,0.5);
  box-shadow:0 0 40px rgba(16,185,129,0.4),0 8px 32px rgba(0,0,0,0.2);
}
.mic-btn svg{width:28px;height:28px;stroke-width:1.5}
.stop-icon{width:16px;height:16px;border-radius:3px;background:#fff}

/* ── Voice Island ── */
.voice-island{
  position:absolute;
  bottom:calc(100% + 16px);
  left:50%;transform:translateX(-50%);
  width:calc(100% - 2rem);max-width:352px;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(64px) saturate(1.8);
  -webkit-backdrop-filter:blur(64px) saturate(1.8);
  border-radius:24px;
  padding:12px;
  box-shadow:0 24px 48px rgba(0,0,0,0.12);
  border:1px solid rgba(255,255,255,0.8);
  display:flex;align-items:stretch;gap:12px;
  pointer-events:auto;
  opacity:0;transform:translateX(-50%) translateY(30px) scale(0.9);
  transition:opacity 0.35s cubic-bezier(0.34,1.56,0.64,1),transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.voice-island.show{
  opacity:1;transform:translateX(-50%) translateY(0) scale(1);
}
.voice-island.hide{
  opacity:0;transform:translateX(-50%) translateY(20px) scale(0.95);
  pointer-events:none;
}

.voice-status{
  flex:1;
  background:rgba(248,250,252,0.5);
  border-radius:16px;
  padding:16px;
  display:flex;flex-direction:column;justify-content:center;gap:12px;
  border:1px solid rgba(241,245,249,0.5);
}
.voice-active-row{display:flex;align-items:center;gap:8px}
.voice-dot{position:relative;display:flex;align-items:center;justify-content:center}
.voice-dot svg{width:16px;height:16px;color:#10b981;position:relative;z-index:1}
.voice-dot-pulse{position:absolute;inset:0;background:#34d399;border-radius:50%;filter:blur(4px);animation:voicePulse 1.5s ease-in-out infinite}
@keyframes voicePulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.5);opacity:0}}
.voice-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#94a3b8}
.voice-bottom{display:flex;align-items:flex-end;justify-content:space-between}
.voice-transcript{font-size:14px;font-weight:500;color:#1e293b;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.voice-waves{display:flex;align-items:center;gap:2px;height:16px;flex-shrink:0;margin-left:8px}
.voice-wave{width:4px;border-radius:9999px;background:#10b981;height:3px;transition:height 0.08s ease-out}

/* Snap Button */
.snap-btn{
  width:88px;flex-shrink:0;
  position:relative;
  border-radius:16px;overflow:hidden;
  background:#0f172a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;cursor:pointer;
  border:none;
  transition:transform 0.15s;
}
.snap-btn:active{transform:scale(0.95)}
.snap-bg{position:absolute;inset:0;opacity:0.4;background-size:cover;background-position:center;background-image:url('https://images.unsplash.com/photo-1542838132-92c53300491e?w=200&h=200&fit=crop')}
.snap-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);transition:background 0.2s}
.snap-btn:hover .snap-overlay{background:rgba(0,0,0,0.2)}
.snap-scanner{position:absolute;left:0;right:0;height:1px;background:#34d399;box-shadow:0 0 12px rgba(16,185,129,1);animation:scanLine 2.5s linear infinite}
@keyframes scanLine{0%{top:-10%}100%{top:110%}}
.snap-btn svg{width:24px;height:24px;stroke-width:1.5;position:relative;z-index:2;margin-bottom:6px}
.snap-label{font-size:9px;font-weight:700;letter-spacing:0.15em;position:relative;z-index:2;color:rgba(255,255,255,0.9)}

/* ── Toast ── */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);
  background:rgba(255,255,255,0.85);backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border:1px solid rgba(255,255,255,0.6);
  border-radius:16px;padding:12px 20px;
  box-shadow:0 8px 30px rgba(0,0,0,0.08);
  font-size:14px;font-weight:500;color:#1e293b;
  z-index:100;display:flex;align-items:center;gap:8px;
  transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),opacity 0.4s;
  opacity:0;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-icon{width:20px;height:20px;color:#10b981}

/* ── Settings View ── */
.settings-view{display:none;padding:48px 24px 32px}
.settings-title{font-size:30px;font-weight:700;letter-spacing:-0.02em;color:#0f172a;margin-bottom:24px}
.settings-card{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(40px) saturate(1.8);
  -webkit-backdrop-filter:blur(40px) saturate(1.8);
  border:1px solid rgba(255,255,255,0.5);
  border-radius:24px;
  padding:24px;
  box-shadow:0 8px 30px rgba(0,0,0,0.04);
  margin-bottom:16px;
}
.settings-card-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#64748b;margin-bottom:16px}
.settings-group{margin-bottom:16px}
.settings-group:last-child{margin-bottom:0}
.settings-label{display:block;font-size:13px;font-weight:500;color:#475569;margin-bottom:6px}
.settings-input{
  width:100%;padding:12px 14px;
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(255,255,255,0.5);
  border-radius:14px;
  color:#1e293b;font-size:15px;font-family:inherit;
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
.settings-input:focus{border-color:rgba(16,185,129,0.35);box-shadow:0 0 16px rgba(16,185,129,0.08)}
.settings-input::placeholder{color:#94a3b8}
.settings-computed{font-size:13px;font-weight:500;color:#64748b;margin-top:12px;padding:10px 14px;background:rgba(148,163,184,0.08);border-radius:12px}
.settings-computed strong{color:#1e293b}
.settings-save{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:#10b981;color:#fff;font-size:15px;font-weight:600;
  font-family:inherit;cursor:pointer;
  box-shadow:0 4px 20px rgba(16,185,129,0.25);
  transition:transform 0.15s;margin-top:8px;
}
.settings-save:active{transform:scale(0.98)}
.settings-danger{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:rgba(244,63,94,0.1);color:#f43f5e;font-size:14px;font-weight:600;
  font-family:inherit;cursor:pointer;transition:transform 0.15s;margin-top:8px;
}
.settings-danger:active{transform:scale(0.98)}

/* ── Camera Overlay ── */
.camera-overlay{
  position:fixed;inset:0;z-index:60;
  background:#000;display:none;
  flex-direction:column;align-items:center;justify-content:center;
}
.camera-overlay.active{display:flex}
.camera-overlay video{width:100%;height:100%;object-fit:cover}
.camera-overlay .camera-controls{
  position:absolute;bottom:40px;left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:24px;
}
.camera-capture{
  width:72px;height:72px;border-radius:50%;
  border:4px solid #fff;background:rgba(255,255,255,0.3);
  backdrop-filter:blur(8px);cursor:pointer;transition:transform 0.15s;
}
.camera-capture:active{transform:scale(0.9)}
.camera-cancel{
  background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.2);border-radius:50%;
  width:48px;height:48px;display:flex;align-items:center;justify-content:center;
  color:#fff;cursor:pointer;
}
.camera-cancel svg{width:24px;height:24px;stroke-width:1.5}

/* ── Camera hotbar button ── */
.cam-btn{
  position:absolute;left:50%;top:-24px;transform:translateX(calc(-50% + 52px));
  width:44px;height:44px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.5);
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(16px);
  color:#64748b;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,0.1);
  transition:all 0.2s;
}
.cam-btn:hover{color:#1e293b;transform:translateX(calc(-50% + 52px)) scale(1.05)}
.cam-btn:active{transform:translateX(calc(-50% + 52px)) scale(0.95)}
.cam-btn svg{width:20px;height:20px;stroke-width:1.5}

/* ── Empty state ── */
.empty-state{text-align:center;padding:40px 20px;color:#94a3b8}
.empty-state svg{width:48px;height:48px;stroke-width:1;margin-bottom:12px;opacity:0.5}
.empty-state p{font-size:14px;font-weight:500}
.empty-state .empty-hint{font-size:12px;margin-top:4px;color:#cbd5e1}

/* ── Processing state ── */
.mic-btn.processing{
  background:linear-gradient(to top right,#6366f1,#818cf8);
  border-color:rgba(99,102,241,0.5);
  box-shadow:0 0 40px rgba(99,102,241,0.3),0 8px 32px rgba(0,0,0,0.2);
  animation:processingPulse 1.5s ease-in-out infinite;
}
@keyframes processingPulse{0%,100%{opacity:1}50%{opacity:0.7}}

/* ── Edit Modal ── */
.edit-overlay{
  position:fixed;inset:0;z-index:70;
  background:rgba(0,0,0,0.3);backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:none;align-items:flex-end;justify-content:center;
}
.edit-overlay.active{display:flex}
.edit-sheet{
  width:100%;max-width:448px;
  background:rgba(255,255,255,0.95);backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border-radius:24px 24px 0 0;
  padding:24px 24px 40px;
  box-shadow:0 -8px 40px rgba(0,0,0,0.1);
}
.edit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.edit-title{font-size:18px;font-weight:600;color:#0f172a}
.edit-close{background:none;border:none;color:#94a3b8;cursor:pointer;padding:4px;display:flex}
.edit-close svg{width:24px;height:24px;stroke-width:1.5}
.edit-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.edit-row:last-child{border-bottom:none}
.edit-label{font-size:14px;font-weight:500;color:#475569}
.edit-value{font-size:14px;font-weight:600;color:#1e293b}
.edit-servings{display:flex;align-items:center;gap:16px;margin:16px 0 20px}
.edit-servings-label{font-size:14px;font-weight:500;color:#475569}
.edit-servings-ctrl{display:flex;align-items:center;gap:12px}
.edit-servings-btn{
  width:36px;height:36px;border-radius:50%;border:1px solid rgba(0,0,0,0.1);
  background:rgba(255,255,255,0.8);color:#1e293b;font-size:18px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
.edit-servings-btn:active{background:rgba(16,185,129,0.1)}
.edit-servings-num{font-size:20px;font-weight:700;color:#1e293b;min-width:24px;text-align:center}
.edit-save{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:#10b981;color:#fff;font-size:15px;font-weight:600;
  font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(16,185,129,0.25);
  transition:transform 0.15s;
}
.edit-save:active{transform:scale(0.98)}
.edit-delete{
  width:100%;padding:12px;border:none;border-radius:14px;
  background:transparent;color:#f43f5e;font-size:14px;font-weight:600;
  font-family:inherit;cursor:pointer;margin-top:8px;
}

/* ── Serving badge on log cards ── */
.log-serving{font-size:11px;font-weight:600;color:#10b981;margin-left:4px}
.log-card{cursor:pointer;transition:transform 0.15s,box-shadow 0.15s}
.log-card:active{transform:scale(0.98)}
</style>
</head>
<body>

<!-- Mesh Background -->
<div class="mesh-bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 6L9 17l-5-5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <span id="toast-msg"></span>
</div>

<!-- App -->
<div class="app">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-date" id="header-date"></div>
      <h1 class="header-title">Summary</h1>
    </div>
    <div class="header-avatar" id="header-avatar">
      <img src="https://images.unsplash.com/photo-1510711070725-068a3a878a99?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&w=200&q=80" alt="Profile" onerror="this.style.display='none'">
    </div>
  </div>

  <!-- Home View wrapper -->
  <div id="home-view">
  <!-- Dashboard -->
  <div class="dashboard">
    <div class="dashboard-inner">
      <!-- Calorie Ring -->
      <div class="calorie-ring">
        <svg viewBox="0 0 100 100">
          <circle class="track" cx="50" cy="50" r="45"/>
          <circle class="progress" id="cal-progress" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="283"/>
        </svg>
        <div class="calorie-center">
          <span class="calorie-num" id="cal-num">0</span>
          <span class="calorie-label">Kcal</span>
        </div>
      </div>

      <!-- Macros -->
      <div class="macros">
        <div class="macro-row">
          <div class="macro-header">
            <span class="macro-name">Protein</span>
            <span class="macro-val"><strong id="protein-val">0</strong> / <span id="protein-goal-display">150</span>g</span>
          </div>
          <div class="macro-bar protein"><div class="macro-bar-fill" id="protein-bar" style="width:0%"></div></div>
        </div>
        <div class="macro-row">
          <div class="macro-header">
            <span class="macro-name">Carbs</span>
            <span class="macro-val"><strong id="carbs-val">0</strong> / <span id="carbs-goal-display">200</span>g</span>
          </div>
          <div class="macro-bar carbs"><div class="macro-bar-fill" id="carbs-bar" style="width:0%"></div></div>
        </div>
        <div class="macro-row">
          <div class="macro-header">
            <span class="macro-name">Fat</span>
            <span class="macro-val"><strong id="fat-val">0</strong> / <span id="fat-goal-display">70</span>g</span>
          </div>
          <div class="macro-bar fat"><div class="macro-bar-fill" id="fat-bar" style="width:0%"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Recent Logs -->
  <div class="logs-section">
    <div class="logs-header">
      <h2 class="logs-title">Today's Logs</h2>
      <button class="logs-see-all">See all</button>
    </div>
    <div class="logs-list" id="logs-list"></div>
  </div>
  </div><!-- /home-view -->

  <!-- Settings View -->
  <div class="settings-view" id="settings-view">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
      <button id="settings-back" style="background:none;border:none;cursor:pointer;color:#64748b;display:flex;align-items:center;padding:4px">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="settings-title" style="margin-bottom:0">Settings</h1>
    </div>

    <div class="settings-card">
      <div class="settings-card-title">API Keys</div>
      <div class="settings-group">
        <label class="settings-label" for="input-openai-key">OpenAI API Key (Whisper)</label>
        <input class="settings-input" id="input-openai-key" type="password" placeholder="sk-..." autocomplete="off">
      </div>
      <div class="settings-group">
        <label class="settings-label" for="input-anthropic-key">Anthropic API Key (Claude)</label>
        <input class="settings-input" id="input-anthropic-key" type="password" placeholder="sk-ant-..." autocomplete="off">
      </div>
    </div>

    <div class="settings-card">
      <div class="settings-card-title">Daily Goals</div>
      <div class="settings-group">
        <label class="settings-label" for="input-target-cal">Target Calories</label>
        <input class="settings-input" id="input-target-cal" type="number" min="500" max="10000" placeholder="2200">
      </div>
      <div class="settings-group">
        <label class="settings-label" for="input-protein-goal">Protein Goal (g)</label>
        <input class="settings-input" id="input-protein-goal" type="number" min="0" max="500" placeholder="150">
      </div>
      <div class="settings-computed" id="computed-macros">
        Carbs: <strong>220g</strong> &middot; Fat: <strong>80g</strong> <span style="color:#94a3b8">(auto-scaled)</span>
      </div>
    </div>

    <button class="settings-save" id="settings-save">Save Settings</button>
    <button class="settings-danger" id="clear-logs-btn">Clear All Logs</button>
  </div>

</div>

<!-- Bottom Hotbar -->
<div class="hotbar-wrap">
  <div class="hotbar" id="hotbar">

    <!-- Voice Island -->
    <div class="voice-island hide" id="voice-island">
      <div class="voice-status">
        <div class="voice-active-row">
          <div class="voice-dot">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
            <div class="voice-dot-pulse"></div>
          </div>
          <span class="voice-label">Voice Active</span>
        </div>
        <div class="voice-bottom">
          <span class="voice-transcript" id="voice-transcript">Listening...</span>
          <div class="voice-waves" id="voice-waves">
            <div class="voice-wave"></div>
            <div class="voice-wave"></div>
            <div class="voice-wave"></div>
            <div class="voice-wave"></div>
            <div class="voice-wave"></div>
          </div>
        </div>
      </div>
      <button class="snap-btn" id="snap-btn">
        <div class="snap-bg"></div>
        <div class="snap-overlay"></div>
        <div class="snap-scanner"></div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14.5 4h-5L8 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-4l-1.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        <span class="snap-label">SNAP</span>
      </button>
    </div>

    <!-- Left Side -->
    <div class="hotbar-side">
      <button class="hotbar-btn active" id="nav-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      </button>
      <button class="hotbar-btn" id="nav-history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
      </button>
    </div>

    <!-- Center Mic Button -->
    <button class="mic-btn" id="mic-btn">
      <svg id="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      <div id="stop-icon" class="stop-icon" style="display:none"></div>
    </button>

    <!-- Camera Button (independent) -->
    <button class="cam-btn" id="cam-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14.5 4h-5L8 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-4l-1.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
    </button>

    <!-- Right Side -->
    <div class="hotbar-side">
      <button class="hotbar-btn" id="nav-target">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      </button>
    </div>

  </div>
</div>

<!-- Camera Overlay -->
<div class="camera-overlay" id="camera-overlay">
  <video id="camera-video" playsinline autoplay></video>
  <div class="camera-controls">
    <button class="camera-cancel" id="camera-cancel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="camera-capture" id="camera-capture"></button>
  </div>
</div>
<canvas id="camera-canvas" style="display:none"></canvas>

<!-- Edit Modal -->
<div class="edit-overlay" id="edit-overlay">
  <div class="edit-sheet">
    <div class="edit-header">
      <span class="edit-title" id="edit-name">Food</span>
      <button class="edit-close" id="edit-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="edit-servings">
      <span class="edit-servings-label">Servings</span>
      <div class="edit-servings-ctrl">
        <button class="edit-servings-btn" id="edit-minus">−</button>
        <span class="edit-servings-num" id="edit-servings-num">1</span>
        <button class="edit-servings-btn" id="edit-plus">+</button>
      </div>
    </div>
    <div id="edit-macros">
      <div class="edit-row"><span class="edit-label">Calories</span><span class="edit-value" id="edit-cal">0</span></div>
      <div class="edit-row"><span class="edit-label">Protein</span><span class="edit-value" id="edit-protein">0g</span></div>
      <div class="edit-row"><span class="edit-label">Carbs</span><span class="edit-value" id="edit-carbs">0g</span></div>
      <div class="edit-row"><span class="edit-label">Fat</span><span class="edit-value" id="edit-fat">0g</span></div>
    </div>
    <button class="edit-save" id="edit-save">Save</button>
    <button class="edit-delete" id="edit-delete">Delete Entry</button>
  </div>
</div>

<script>
(function(){
  'use strict';

  // ── Settings & Persistence ──
  const STORAGE = { settings: 'vcal_settings', logs: 'vcal_logs' };
  const DEFAULTS = { openaiKey: '', anthropicKey: '', targetCalories: 2200, proteinGoal: 150 };

  function loadSettings() {
    try { return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem(STORAGE.settings))); }
    catch { return Object.assign({}, DEFAULTS); }
  }
  function saveSettings(s) { settings = s; localStorage.setItem(STORAGE.settings, JSON.stringify(s)); }
  function loadLogs() {
    try { return JSON.parse(localStorage.getItem(STORAGE.logs)) || []; }
    catch { return []; }
  }
  function saveLogs() { localStorage.setItem(STORAGE.logs, JSON.stringify(logs)); }

  function computeMacros(cal, proteinG) {
    const remaining = Math.max(cal - proteinG * 4, 0);
    return { protein: proteinG, carbs: Math.round(remaining * 0.55 / 4), fat: Math.round(remaining * 0.45 / 9) };
  }
  function getMacroGoals() { return computeMacros(settings.targetCalories, settings.proteinGoal); }

  let settings = loadSettings();
  let logs = loadLogs();
  let isLogging = false;
  let isProcessing = false;
  let mediaRecorder = null;
  let audioChunks = [];
  let currentView = 'home';
  let audioContext = null;
  let analyserNode = null;
  let animFrameId = null;
  let editingLogId = null;
  let editServings = 1;

  // ── Elements ──
  const $ = id => document.getElementById(id);
  const calProgress = $('cal-progress');
  const calNum = $('cal-num');
  const proteinVal = $('protein-val');
  const carbsVal = $('carbs-val');
  const fatVal = $('fat-val');
  const proteinBar = $('protein-bar');
  const carbsBar = $('carbs-bar');
  const fatBar = $('fat-bar');
  const logsList = $('logs-list');
  const micBtn = $('mic-btn');
  const micIcon = $('mic-icon');
  const stopIcon = $('stop-icon');
  const voiceIsland = $('voice-island');
  const voiceTranscript = $('voice-transcript');
  const snapBtn = $('snap-btn');
  const toastEl = $('toast');
  const toastMsg = $('toast-msg');
  const homeView = $('home-view');
  const settingsView = $('settings-view');
  const computedMacros = $('computed-macros');

  // ── Date Header ──
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function ordinal(n){ const s=['th','st','nd','rd']; const v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
  const now = new Date();
  $('header-date').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${ordinal(now.getDate())}`;

  // ── SVG Icon Templates ──
  const icons = {
    meal: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>',
    snack: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20.94c1.5 0 2.75 1.06 4 1.06 3 0 6-8 6-12.22A4.91 4.91 0 0 0 17 5c-2.22 0-4 1.44-5 2-1-.56-2.78-2-5-2a4.9 4.9 0 0 0-5 4.78C2 14 5 22 8 22c1.25 0 2.5-1.06 4-1.06Z"/><path d="M10 2c1 .5 2 2 2 5"/></svg>',
    drink: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>',
  };

  // ── Navigation ──
  function switchView(view) {
    currentView = view;
    homeView.style.display = view === 'home' ? '' : 'none';
    settingsView.style.display = view === 'settings' ? 'block' : 'none';
    document.querySelector('.hotbar-wrap').style.display = view === 'settings' ? 'none' : '';
    document.querySelector('.header').style.display = view === 'settings' ? 'none' : '';
    document.querySelectorAll('.hotbar-btn').forEach(b => b.classList.remove('active'));
    if (view === 'home') $('nav-home').classList.add('active');
    if (view === 'settings') populateSettings();
  }
  $('nav-home').onclick = () => switchView('home');
  $('nav-history').onclick = () => showToast('History coming soon');
  $('nav-target').onclick = () => switchView('settings');
  $('header-avatar').onclick = () => switchView('settings');
  $('settings-back').onclick = () => switchView('home');

  // ── Settings UI ──
  function populateSettings() {
    $('input-openai-key').value = settings.openaiKey;
    $('input-anthropic-key').value = settings.anthropicKey;
    $('input-target-cal').value = settings.targetCalories;
    $('input-protein-goal').value = settings.proteinGoal;
    updateComputedMacros();
  }
  function updateComputedMacros() {
    const cal = parseInt($('input-target-cal').value) || 2200;
    const p = parseInt($('input-protein-goal').value) || 150;
    const m = computeMacros(cal, p);
    computedMacros.innerHTML = `Carbs: <strong>${m.carbs}g</strong> &middot; Fat: <strong>${m.fat}g</strong> <span style="color:#94a3b8">(auto-scaled)</span>`;
  }
  $('input-target-cal').addEventListener('input', updateComputedMacros);
  $('input-protein-goal').addEventListener('input', updateComputedMacros);
  $('settings-save').onclick = () => {
    settings.openaiKey = $('input-openai-key').value.trim();
    settings.anthropicKey = $('input-anthropic-key').value.trim();
    settings.targetCalories = parseInt($('input-target-cal').value) || 2200;
    settings.proteinGoal = parseInt($('input-protein-goal').value) || 150;
    saveSettings(settings);
    render();
    showToast('Settings saved');
  };
  $('clear-logs-btn').onclick = () => {
    if (confirm('Clear all food logs?')) { logs = []; saveLogs(); render(); showToast('Logs cleared'); }
  };

  // ── Render ──
  function render() {
    const goals = getMacroGoals();
    const totalCal = logs.reduce((s,l) => s + l.calories, 0);
    const totalP = logs.reduce((s,l) => s + l.macros.protein, 0);
    const totalC = logs.reduce((s,l) => s + l.macros.carbs, 0);
    const totalF = logs.reduce((s,l) => s + l.macros.fat, 0);

    // Calorie ring
    const pct = Math.min(totalCal / settings.targetCalories, 1);
    const circumference = 283;
    calProgress.setAttribute('stroke-dashoffset', circumference - circumference * pct);
    calNum.textContent = totalCal;

    // Macros
    proteinVal.textContent = totalP;
    carbsVal.textContent = totalC;
    fatVal.textContent = totalF;
    $('protein-goal-display').textContent = goals.protein;
    $('carbs-goal-display').textContent = goals.carbs;
    $('fat-goal-display').textContent = goals.fat;
    proteinBar.style.width = Math.min(totalP / goals.protein * 100, 100) + '%';
    carbsBar.style.width = Math.min(totalC / goals.carbs * 100, 100) + '%';
    fatBar.style.width = Math.min(totalF / goals.fat * 100, 100) + '%';

    // Logs
    if (logs.length === 0) {
      logsList.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg><p>No logs yet</p><p class="empty-hint">Tap the mic to log food by voice</p></div>';
      return;
    }
    logsList.innerHTML = logs.map(log => `
      <div class="log-card" data-id="${log.id}">
        <div class="log-left">
          <div class="log-icon ${log.icon}">${icons[log.icon] || icons.meal}</div>
          <div class="log-info">
            <div class="log-name-row">
              <span class="log-name">${log.name}</span>${(log.servings && log.servings > 1) ? `<span class="log-serving">×${log.servings}</span>` : ''}
              <div class="quality-dot ${log.quality}"></div>
            </div>
            <div class="log-meta">
              <span class="log-time">${log.time}</span>
              <div class="log-macros-tag">
                <span>P:${log.macros.protein}g</span>
                <span>C:${log.macros.carbs}g</span>
                <span>F:${log.macros.fat}g</span>
              </div>
            </div>
          </div>
        </div>
        <div class="log-right">
          <span class="log-cal">${log.calories}</span>
          <span class="log-cal-unit">Kcal</span>
        </div>
      </div>
    `).join('');
    // Attach click handlers for editing
    logsList.querySelectorAll('.log-card[data-id]').forEach(card => {
      card.onclick = () => openEditModal(card.dataset.id);
    });
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg) {
    toastMsg.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
  }

  function addLog(log) {
    logs.unshift(log);
    saveLogs();
    render();
  }

  // ── Audio Visualizer ──
  const waveBars = $('voice-waves').children;
  function startVisualizer(stream) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(stream);
    analyserNode = audioContext.createAnalyser();
    analyserNode.fftSize = 64;
    analyserNode.smoothingTimeConstant = 0.6;
    source.connect(analyserNode);
    const dataArray = new Uint8Array(analyserNode.frequencyBinCount);
    function draw() {
      animFrameId = requestAnimationFrame(draw);
      analyserNode.getByteFrequencyData(dataArray);
      for (let i = 0; i < waveBars.length; i++) {
        const val = dataArray[i + 2] || 0;
        const h = Math.max(3, (val / 255) * 16);
        waveBars[i].style.height = h + 'px';
      }
    }
    draw();
  }
  function stopVisualizer() {
    if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
    if (audioContext) { audioContext.close().catch(() => {}); audioContext = null; }
    for (let i = 0; i < waveBars.length; i++) waveBars[i].style.height = '3px';
  }

  // ── Voice Recording (Whisper) ──
  async function startLogging() {
    if (!settings.openaiKey) { showToast('Set OpenAI API key in Settings'); switchView('settings'); return; }
    if (!settings.anthropicKey) { showToast('Set Anthropic API key in Settings'); switchView('settings'); return; }

    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      isLogging = true;
      audioChunks = [];
      micBtn.classList.add('recording');
      micIcon.style.display = 'none';
      stopIcon.style.display = 'block';
      voiceTranscript.textContent = 'Listening...';
      voiceIsland.classList.remove('hide');
      voiceIsland.classList.add('show');
      startVisualizer(stream);

      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';

      mediaRecorder = new MediaRecorder(stream, { mimeType });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        stopVisualizer();
        if (audioChunks.length === 0) { resetMicUI(); return; }
        await transcribeAndAnalyze();
      };
      mediaRecorder.start();
    } catch (err) {
      showToast('Microphone access denied');
      resetMicUI();
    }
  }

  function stopLogging() {
    if (!isLogging) return;
    isLogging = false;
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    } else {
      resetMicUI();
    }
  }

  function resetMicUI() {
    isLogging = false;
    isProcessing = false;
    micBtn.classList.remove('recording', 'processing');
    micIcon.style.display = 'block';
    stopIcon.style.display = 'none';
    voiceIsland.classList.remove('show');
    voiceIsland.classList.add('hide');
  }

  async function transcribeAndAnalyze() {
    isProcessing = true;
    micBtn.classList.remove('recording');
    micBtn.classList.add('processing');
    micIcon.style.display = 'block';
    stopIcon.style.display = 'none';
    voiceTranscript.textContent = 'Transcribing...';

    try {
      const ext = audioChunks[0].type.includes('mp4') ? 'mp4' : 'webm';
      const blob = new Blob(audioChunks, { type: audioChunks[0].type });
      const formData = new FormData();
      formData.append('file', blob, `audio.${ext}`);
      formData.append('model', 'whisper-1');

      const res = await fetch('https://api.openai.com/v1/audio/transcriptions', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + settings.openaiKey },
        body: formData
      });

      if (!res.ok) {
        const errText = res.status === 401 ? 'Invalid OpenAI API key' : `Whisper error (${res.status})`;
        showToast(errText); resetMicUI(); return;
      }

      const data = await res.json();
      const transcript = data.text;
      voiceTranscript.textContent = transcript;

      await analyzeWithClaude(transcript);
    } catch (err) {
      showToast('Network error — try again');
      resetMicUI();
    }
  }

  // ── Claude Food Analysis ──
  async function analyzeWithClaude(text) {
    voiceTranscript.textContent = 'Analyzing...';
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': settings.anthropicKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1024,
          messages: [{ role: 'user', content: `Break down this food log entry into INDIVIDUAL ingredients. Use USDA FoodData Central nutrition values per single serving. Return ONLY a valid JSON array, no markdown fences.\n\nFormat: [{"name":"Ingredient Name","servings":NUMBER,"calories_per_serving":NUMBER,"protein_per_serving":NUMBER,"carbs_per_serving":NUMBER,"fat_per_serving":NUMBER,"icon":"meal|snack|drink","quality":"green|yellow|red"}]\n\nRules:\n- Each ingredient is a separate item in the array\n- "servings" is how many of that item (e.g. "3 eggs" = name:"Egg", servings:3)\n- Nutrition values are PER SINGLE SERVING based on USDA standard portions\n- calories_per_serving, protein/carbs/fat_per_serving are per 1 serving\n- Quality: green=healthy/whole foods, yellow=moderate, red=junk/high-sugar\n- Icon: meal=main meals/proteins, snack=snacks/fruits/bars, drink=beverages\n\nExample: "3 eggs and 2 chicken sausages" → [{"name":"Egg","servings":3,"calories_per_serving":72,"protein_per_serving":6,"carbs_per_serving":0,"fat_per_serving":5,"icon":"meal","quality":"green"},{"name":"Chicken Sausage","servings":2,"calories_per_serving":130,"protein_per_serving":13,"carbs_per_serving":2,"fat_per_serving":7,"icon":"meal","quality":"yellow"}]\n\nEntry: "${text}"` }]
        })
      });

      if (!res.ok) {
        const errText = res.status === 401 ? 'Invalid Anthropic API key' : `Claude error (${res.status})`;
        showToast(errText); resetMicUI(); return;
      }

      const data = await res.json();
      let raw = data.content[0].text.replace(/```json?\s*/g, '').replace(/```\s*/g, '').trim();
      const items = JSON.parse(raw);
      const arr = Array.isArray(items) ? items : [items];
      const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      arr.forEach((item, i) => {
        const s = item.servings || 1;
        addLog({
          id: (Date.now() + i).toString(),
          name: item.name || 'Unknown Food',
          servings: s,
          caloriesPerServing: item.calories_per_serving || 0,
          proteinPerServing: item.protein_per_serving || 0,
          carbsPerServing: item.carbs_per_serving || 0,
          fatPerServing: item.fat_per_serving || 0,
          calories: Math.round((item.calories_per_serving || 0) * s),
          time: timeStr,
          icon: ['meal','snack','drink'].includes(item.icon) ? item.icon : 'meal',
          macros: {
            protein: Math.round((item.protein_per_serving || 0) * s),
            carbs: Math.round((item.carbs_per_serving || 0) * s),
            fat: Math.round((item.fat_per_serving || 0) * s)
          },
          quality: ['green','yellow','red'].includes(item.quality) ? item.quality : 'yellow'
        });
      });
      showToast(`Added ${arr.length} item${arr.length > 1 ? 's' : ''}`);
      resetMicUI();
    } catch (err) {
      console.error('Claude parse error:', err);
      showToast('Could not parse food data');
      resetMicUI();
    }
  }

  micBtn.addEventListener('click', () => {
    if (isProcessing) return;
    if (isLogging) stopLogging();
    else startLogging();
  });

  // ── Edit Modal ──
  const editOverlay = $('edit-overlay');
  function openEditModal(logId) {
    const log = logs.find(l => l.id === logId);
    if (!log) return;
    editingLogId = logId;
    editServings = log.servings || 1;
    $('edit-name').textContent = log.name;
    updateEditDisplay(log);
    editOverlay.classList.add('active');
  }
  function updateEditDisplay(log) {
    if (!log) log = logs.find(l => l.id === editingLogId);
    if (!log) return;
    const cps = log.caloriesPerServing || log.calories / (log.servings || 1);
    const pps = log.proteinPerServing || log.macros.protein / (log.servings || 1);
    const cpps = log.carbsPerServing || log.macros.carbs / (log.servings || 1);
    const fps = log.fatPerServing || log.macros.fat / (log.servings || 1);
    $('edit-servings-num').textContent = editServings;
    $('edit-cal').textContent = Math.round(cps * editServings);
    $('edit-protein').textContent = Math.round(pps * editServings) + 'g';
    $('edit-carbs').textContent = Math.round(cpps * editServings) + 'g';
    $('edit-fat').textContent = Math.round(fps * editServings) + 'g';
  }
  function closeEditModal() { editOverlay.classList.remove('active'); editingLogId = null; }
  $('edit-close').onclick = closeEditModal;
  editOverlay.onclick = e => { if (e.target === editOverlay) closeEditModal(); };
  $('edit-minus').onclick = () => {
    if (editServings > 0.5) { editServings = Math.round((editServings - 0.5) * 10) / 10; updateEditDisplay(); }
  };
  $('edit-plus').onclick = () => {
    editServings = Math.round((editServings + 0.5) * 10) / 10; updateEditDisplay();
  };
  $('edit-save').onclick = () => {
    const log = logs.find(l => l.id === editingLogId);
    if (!log) return;
    const cps = log.caloriesPerServing || log.calories / (log.servings || 1);
    const pps = log.proteinPerServing || log.macros.protein / (log.servings || 1);
    const cpps = log.carbsPerServing || log.macros.carbs / (log.servings || 1);
    const fps = log.fatPerServing || log.macros.fat / (log.servings || 1);
    log.servings = editServings;
    log.calories = Math.round(cps * editServings);
    log.macros.protein = Math.round(pps * editServings);
    log.macros.carbs = Math.round(cpps * editServings);
    log.macros.fat = Math.round(fps * editServings);
    saveLogs(); render(); closeEditModal();
    showToast('Updated ' + log.name);
  };
  $('edit-delete').onclick = () => {
    logs = logs.filter(l => l.id !== editingLogId);
    saveLogs(); render(); closeEditModal();
    showToast('Entry deleted');
  };

  // ── Camera / Label Scanning ──
  const cameraOverlay = $('camera-overlay');
  const cameraVideo = $('camera-video');
  const cameraCanvas = $('camera-canvas');
  let cameraStream = null;

  async function openCamera() {
    if (!settings.anthropicKey) { showToast('Set Anthropic API key in Settings'); switchView('settings'); return; }
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      cameraVideo.srcObject = cameraStream;
      cameraOverlay.classList.add('active');
    } catch (err) {
      showToast('Camera access denied');
    }
  }

  function closeCamera() {
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    cameraVideo.srcObject = null;
    cameraOverlay.classList.remove('active');
  }

  async function captureAndAnalyze() {
    const video = cameraVideo;
    const canvas = cameraCanvas;
    // Scale down to max 1024px
    const scale = Math.min(1024 / Math.max(video.videoWidth, video.videoHeight), 1);
    canvas.width = video.videoWidth * scale;
    canvas.height = video.videoHeight * scale;
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
    const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
    closeCamera();
    showToast('Scanning label...');

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': settings.anthropicKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          messages: [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
            { type: 'text', text: 'Extract nutrition info from this food or nutrition label. Break into individual ingredients if multiple items visible. Use USDA FoodData Central values. Return ONLY a valid JSON array, no markdown fences.\n\nFormat: [{"name":"Food Name","servings":NUMBER,"calories_per_serving":NUMBER,"protein_per_serving":NUMBER,"carbs_per_serving":NUMBER,"fat_per_serving":NUMBER,"icon":"meal|snack|drink","quality":"green|yellow|red"}]\n\nNutrition values are PER SINGLE SERVING. If a nutrition label shows serving size, use that. If no label visible, estimate from the food shown.' }
          ] }]
        })
      });

      if (!res.ok) {
        showToast(res.status === 401 ? 'Invalid Anthropic API key' : `Vision error (${res.status})`);
        return;
      }

      const data = await res.json();
      let raw = data.content[0].text.replace(/```json?\s*/g, '').replace(/```\s*/g, '').trim();
      const items = JSON.parse(raw);
      const arr = Array.isArray(items) ? items : [items];
      const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      arr.forEach((item, i) => {
        const s = item.servings || 1;
        addLog({
          id: (Date.now() + i).toString(),
          name: item.name || 'Scanned Label',
          servings: s,
          caloriesPerServing: item.calories_per_serving || 0,
          proteinPerServing: item.protein_per_serving || 0,
          carbsPerServing: item.carbs_per_serving || 0,
          fatPerServing: item.fat_per_serving || 0,
          calories: Math.round((item.calories_per_serving || 0) * s),
          time: timeStr,
          icon: ['meal','snack','drink'].includes(item.icon) ? item.icon : 'snack',
          macros: {
            protein: Math.round((item.protein_per_serving || 0) * s),
            carbs: Math.round((item.carbs_per_serving || 0) * s),
            fat: Math.round((item.fat_per_serving || 0) * s)
          },
          quality: ['green','yellow','red'].includes(item.quality) ? item.quality : 'yellow'
        });
      });
      showToast(`Added ${arr.length} item${arr.length > 1 ? 's' : ''}`);
    } catch (err) {
      console.error('Vision parse error:', err);
      showToast('Could not parse label');
    }
  }

  // Camera buttons
  $('cam-btn').onclick = () => openCamera();
  snapBtn.addEventListener('click', () => { stopLogging(); openCamera(); });
  $('camera-capture').onclick = () => captureAndAnalyze();
  $('camera-cancel').onclick = () => closeCamera();

  // ── Init ──
  render();
  calProgress.setAttribute('stroke-dashoffset', '283');
  requestAnimationFrame(() => { requestAnimationFrame(() => render()); });
})();
</script>
</body>
</html>
